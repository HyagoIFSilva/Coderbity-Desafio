name: Cypress E2E Tests

# Executa os testes toda vez que houver um push na branch main ou um Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      # Utiliza a Action oficial do Cypress para garantir instalação e cache do ambiente
      - name: Rodar Testes Cypress
        uses: cypress-io/github-action@v6
        with:
          # Executa o cypress no modo headless automaticamente
          browser: chrome
